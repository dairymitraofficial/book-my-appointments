<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>{% block title %}Owner{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/static/css/instagram.css" />
    <script src="/static/js/bookings.js"></script>
    <script src="/static/js/calendar.js"></script>
    <script src="/static/js/common.js"></script>
    <script src="/static/js/otp.js"></script>
    <script src="/static/js/pincode.js"></script>
    <script src="/static/js/profile.js"></script>
    <link rel="manifest" href="/static/manifest.json" />
    <link rel="icon" type="image/png" href="/static/icons/bma_app_192.png" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css"
    />
    <link rel="icon" href="data:," />
  </head>

  <body>
    <div class="app">
      {% include "partials/top_nav.html" %}

      <div class="page-content">{% block content %}{% endblock %}</div>

      <!-- BOTTOM NAV -->
      <nav class="bottom-nav app-nav">
        <a
          href="/owner/schedule"
          class="{% if active_tab=='schedule' %}active{% endif %}"
        >
          📅
          <span>Schedule</span>
        </a>

        <a
          href="/owner/messages"
          class="{% if active_tab=='messages' %}active{% endif %}"
        >
          💬
          <span>Messages</span>
        </a>

        <a
          href="/owner/account"
          class="{% if active_tab=='account' %}active{% endif %}"
        >
          👤
          <span>Account</span>
        </a>
      </nav>
    </div>

    <!-- 🔔 FIREBASE (ONCE, FOR OWNER) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-messaging-compat.js"></script>

    <script>
      firebase.initializeApp({
        apiKey: "AIzaSyArBwX8Qd4hZhDDRw1IVRXHMtvRrEab3WE",
        authDomain: "book-my-appointment-41063.firebaseapp.com",
        projectId: "book-my-appointment-41063",
        messagingSenderId: "507072853720",
        appId: "1:507072853720:web:d87e283d449e5f354489ad",
      });

      const messaging = firebase.messaging();

      if ("serviceWorker" in navigator) {
        navigator.serviceWorker
          .register("/firebase-messaging-sw.js")
          .then(() => {
            console.log("SW registered");
            return navigator.serviceWorker.ready;
          })
          .then(() => {
            console.log("SW ready");
            return Notification.requestPermission();
          })
          .then((permission) => {
            if (permission !== "granted") {
              throw new Error("Notification permission denied");
            }

            return messaging.getToken({
              vapidKey:
                "BHiLtw0TBXY2xudBdkBB-ZR1vbmabidro6L4n-3ffApr9XjlFcJ9S_yUQoHvcsxHTf3lGbffYb5r1pvjNaq15EA",
            });
          })
          .then((token) => {
            if (token) {
              console.log("FCM token:", token);

              return fetch("/save-push-token", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                credentials: "same-origin",
                body: JSON.stringify({ token }),
              });
            }
          })
          .catch((err) => {
            console.error("FCM ERROR:", err);
          });
      }
    </script>
    <script>
let deferredPrompt;

window.addEventListener("beforeinstallprompt", (e) => {

  if(localStorage.getItem("installDismissed") === "true"){
      return;
  }

  e.preventDefault();
  deferredPrompt = e;

  const banner = document.createElement("div");

  banner.innerHTML = `
  <div id="installBanner" style="
      position:fixed;
      bottom:20px;
      left:50%;
      transform:translateX(-50%);
      width:92%;
      max-width:420px;
      background:white;
      border-radius:16px;
      box-shadow:0 10px 30px rgba(0,0,0,0.2);
      padding:16px;
      display:flex;
      align-items:center;
      gap:14px;
      z-index:9999;
      font-family:Inter,sans-serif;
  ">

    <img src="/static/icons/bma_app_192.png"
         style="width:55px;height:55px;border-radius:12px">

    <div style="flex:1">
        <div style="font-weight:600;font-size:15px">
            Book My Appointment
        </div>
        <div style="font-size:12px;color:#666">
            Install app for faster booking
        </div>
    </div>

    <button id="installBtn" style="
        background:#2563eb;
        border:none;
        color:white;
        padding:8px 14px;
        border-radius:8px;
        font-weight:600;
        cursor:pointer;
    ">
        Install
    </button>

    <button id="closeInstall" style="
        background:none;
        border:none;
        font-size:18px;
        cursor:pointer;
        color:#888;
    ">
        ✕
    </button>

  </div>
  `;

  document.body.appendChild(banner);

  document.getElementById("installBtn").onclick = async () => {
      banner.remove();
      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null;
  };

  document.getElementById("closeInstall").onclick = () => {
      localStorage.setItem("installDismissed","true");
      banner.remove();
  };

});
</script>
  </body>
</html>
